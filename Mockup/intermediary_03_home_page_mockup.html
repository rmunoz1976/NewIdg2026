
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); }
  .phone { width: 320px; margin: 1.5rem auto; background: #e8f5e9; border-radius: 32px; border: 2px solid var(--color-border-secondary); overflow: hidden; }
  .appbar { background: rgba(255,255,255,0.15); padding: 12px 16px 0; }
  .appbar-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .appbar-title { font-size: 15px; font-weight: 500; color: #1a1a1a; letter-spacing: 1px; }
  .appbar-icons { display: flex; gap: 8px; }
  .icon-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.5); border: 0.5px solid rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; }
  .icon-btn svg { width: 14px; height: 14px; }
  .search-box { background: rgba(255,255,255,0.7); border-radius: 20px; border: 1px solid rgba(0,0,0,0.2); padding: 7px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .search-box span { font-size: 12px; color: #888; }
  .tabs-wrap { overflow-x: auto; display: flex; gap: 0; padding-bottom: 2px; scrollbar-width: none; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab { display: flex; flex-direction: column; align-items: center; padding: 6px 10px; gap: 2px; min-width: 56px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { border-bottom: 2px solid #222; }
  .tab-icon { width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .tab-label { font-size: 9px; color: #555; }
  .tab.active .tab-label { color: #111; font-weight: 500; }
  .body { min-height: 320px; background: linear-gradient(180deg, #c8e6c9 0%, #4db6ac 100%); position: relative; }
  .status-bar { background: rgba(255,255,255,0.2); padding: 4px 16px; display: flex; justify-content: space-between; }
  .status-bar span { font-size: 9px; color: #333; }
</style>
