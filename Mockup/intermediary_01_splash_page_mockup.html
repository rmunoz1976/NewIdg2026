
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); }
  .phone { width: 320px; margin: 1.5rem auto; border-radius: 32px; border: 2px solid var(--color-border-secondary); overflow: hidden; }
  .screen { min-height: 520px; background: linear-gradient(180deg, #ffffff 0%, #c8e6c9 30%, #4db6ac 100%); position: relative; display: flex; align-items: center; justify-content: center; }
  .status-bar { position: absolute; top: 0; left: 0; right: 0; background: rgba(255,255,255,0.2); padding: 4px 16px; display: flex; justify-content: space-between; }
  .status-bar span { font-size: 9px; color: #333; }
  .center-content { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .app-name { font-size: 36px; font-style: italic; font-weight: 800; letter-spacing: 1.5px; font-family: 'Georgia', serif; }
  .letter { display: inline-block; }
  .l0 { color: #1a9e6e; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l1 { color: #1db87a; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l2 { color: #22d186; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l3 { color: #1db87a; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l4 { color: #17a068; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l5 { color: #128856; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l6 { color: #0e7044; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l7 { color: #0a5832; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l8 { color: #0e7044; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l9 { color: #128856; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l10 { color: #17a068; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .l11 { color: #1db87a; text-shadow: 0 0 10px rgba(105,240,174,0.8), 2px 2px 4px rgba(0,0,0,0.4); }
  .slogan { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.95); text-shadow: 1px 1px 3px rgba(0,0,0,0.9); align-self: flex-start; padding-left: 4px; }
  .footer { position: absolute; bottom: 20px; right: 16px; text-align: right; }
  .footer-sub { font-size: 13px; color: #212121; text-shadow: 1px 1px 2px rgba(255,255,255,0.3); }
  .footer-by { font-size: 13px; font-weight: 700; font-style: italic; color: #424242; text-shadow: 1px 1px 2px rgba(255,255,255,0.3); }
  .fab { position: absolute; bottom: 16px; left: 16px; width: 36px; height: 36px; background: #4caf50; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
  .fab svg { width: 16px; height: 16px; stroke: white; fill: none; }
  @keyframes colorShift {
    0%   { color: #1a9e6e; }
    25%  { color: #69f0ae; }
    50%  { color: #ffffff; }
    75%  { color: #69f0ae; }
    100% { color: #1a9e6e; }
  }
  .animated .letter { animation: colorShift 2s ease-in-out infinite; }
  .animated .l1  { animation-delay: 0.1s; }
  .animated .l2  { animation-delay: 0.2s; }
  .animated .l3  { animation-delay: 0.3s; }
  .animated .l4  { animation-delay: 0.4s; }
  .animated .l5  { animation-delay: 0.5s; }
  .animated .l6  { animation-delay: 0.6s; }
  .animated .l7  { animation-delay: 0.7s; }
  .animated .l8  { animation-delay: 0.8s; }
  .animated .l9  { animation-delay: 0.9s; }
  .animated .l10 { animation-delay: 1.0s; }
  .animated .l11 { animation-delay: 1.1s; }
</style>

</div>
