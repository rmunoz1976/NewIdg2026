
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); }
  .phone { width: 320px; margin: 1.5rem auto; border-radius: 32px; border: 2px solid var(--color-border-secondary); overflow: hidden; }
  .screen { min-height: 520px; background: linear-gradient(180deg, #ffffff 0%, #c8e6c9 30%, #4db6ac 100%); position: relative; display: flex; flex-direction: column; justify-content: space-between; }
  .status-bar { background: rgba(255,255,255,0.2); padding: 4px 16px; display: flex; justify-content: space-between; }
  .status-bar span { font-size: 9px; color: #333; }
  .form-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .form-box { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px; width: 100%; }
  .form-title { color: #ffffff; font-size: 20px; font-weight: 500; text-align: center; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field-label { font-size: 10px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
  .field-input { background: transparent; border: 1px solid #69f0ae; border-radius: 10px; padding: 8px 10px 8px 32px; width: 100%; color: white; font-size: 12px; position: relative; display: flex; align-items: center; }
  .field-wrapper { position: relative; }
  .field-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); }
  .field-icon svg { width: 14px; height: 14px; stroke: #69f0ae; fill: none; stroke-width: 2; }
  .field-text { background: transparent; border: none; outline: none; color: white; font-size: 12px; width: 100%; padding-left: 4px; }
  .dropdown-arrow { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); }
  .dropdown-arrow svg { width: 12px; height: 12px; stroke: #69f0ae; fill: none; stroke-width: 2; }
  .login-btn { width: 100%; background: #69f0ae; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 500; color: #1a1a1a; margin-top: 4px; cursor: pointer; }
  .bottom-links { padding: 0 16px 24px; display: flex; justify-content: space-between; }
  .link-text { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9); }
  .dots { display: flex; gap: 3px; justify-content: center; align-items: center; padding: 4px 0; }
  .dot { width: 5px; height: 5px; background: rgba(255,255,255,0.4); border-radius: 50%; }
  .dot.active { background: white; }
</style>

<div style="padding: 1rem 0;">
  <div class="phone">
    <div class="screen">
      <div class="status-bar">
        <span>9:41</span>
        <span>●●● WiFi</span>
      </div>

      <div class="form-wrap">
        <div class="form-box">
          <div class="form-title">Login</div>

          <!-- Email dropdown -->
          <div class="field">
            <div class="field-label">Email</div>
            <div style="background:transparent; border:1px solid #69f0ae; border-radius:10px; padding:8px 28px 8px 32px; position:relative;">
              <div class="field-icon">
                <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <span style="font-size:11px; color:white;">Mariaexport@gmail.com</span>
              <div class="dropdown-arrow">
                <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            </div>
          </div>

          <!-- Password -->
          <div class="field">
            <div class="field-label">Password</div>
            <div style="background:transparent; border:1px solid #69f0ae; border-radius:10px; padding:8px 10px 8px 32px; position:relative;">
              <div class="field-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </div>
              <span style="font-size:11px; color:white; letter-spacing:3px;">●●●●●●●●●●</span>
            </div>
          </div>

          <button class="login-btn">Login</button>
        </div>
      </div>

      <div class="bottom-links">
        <span class="link-text">Forgot password?</span>
        <span class="link-text">New Here? Sign Up</span>
      </div>
    </div>
  </div>
  <p style="text-align:center;font-size:12px;color:var(--color-text-secondary);margin-top:8px;">Pantalla Login - con dropdown de cuentas de prueba</p>
</div>
